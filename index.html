<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>補講アーカイブ | ホリエモンAI学校</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #1a1a2e;
      --accent: #e94560;
      --accent2: #0f3460;
      --gold: #f5a623;
      --surface: #16213e;
      --card: #1e2d4a;
      --text: #e8eaf6;
      --muted: #9ea7c4;
      --radius: 14px;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', 'Yu Gothic', sans-serif;
      background: var(--brand);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.7;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 50%, #16213e 100%);
      padding: 56px 20px 44px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 60% 20%, rgba(233,69,96,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-label {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 4px 16px;
      border-radius: 999px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 900;
      margin-bottom: 8px;
    }
    .header h1 span { color: var(--gold); }
    .header p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ── Container ── */
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 16px 64px;
    }

    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    /* ── Archive grid ── */
    .archive-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .archive-card {
      display: block;
      text-decoration: none;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      padding: 24px 20px;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }
    .archive-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--gold));
      opacity: 0;
      transition: opacity 0.15s;
    }
    .archive-card:hover {
      transform: translateY(-3px);
      border-color: rgba(233,69,96,0.3);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .archive-card:hover::before { opacity: 1; }

    .card-year {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 600;
    }
    .card-month {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 10px;
    }
    .card-month span { color: var(--gold); }
    .card-tag {
      display: inline-block;
      font-size: 0.72rem;
      background: rgba(233,69,96,0.15);
      color: #ff8fa3;
      border: 1px solid rgba(233,69,96,0.25);
      border-radius: 6px;
      padding: 2px 10px;
      margin-bottom: 14px;
    }
    .card-courses {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .card-arrow {
      position: absolute;
      bottom: 18px; right: 18px;
      font-size: 1rem;
      color: var(--accent);
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 0.15s, transform 0.15s;
    }
    .archive-card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* ── Footer ── */
    footer {
      background: var(--surface);
      text-align: center;
      padding: 28px 20px;
      color: var(--muted);
      font-size: 0.82rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-label">ホリエモンAI学校</div>
  <h1>補講 <span>アーカイブ</span></h1>
  <p>過去の補講案内はこちらからご覧いただけます</p>
</div>

<div class="container">
  <div class="section-label">月別 補講一覧</div>

  <div class="archive-grid">

    <a class="archive-card" href="./2026-07/">
      <div class="card-year">2026年</div>
      <div class="card-month"><span>7月</span>度</div>
      <div class="card-tag">受付中</div>
      <div class="card-courses">
        🤖 Claude Cowork&amp;Code編<br>
        ⚡ Zapier編<br>
        🔍 Google AIツール基礎編<br>
        🪟 Microsoft AIツール基礎編<br>
        💡 パソコンの基礎編
      </div>
      <div class="card-arrow">→</div>
    </a>

    <!-- 来月以降のカードはここに追加 -->

  </div>
</div>

<footer>
  <p>ホリエモンAI学校 補講アーカイブ</p>
</footer>

</body>
</html>
